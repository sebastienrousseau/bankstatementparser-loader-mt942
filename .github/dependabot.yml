version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 10
    reviewers:
      - "sebastienrousseau"
    labels:
      - "dependencies"
      - "automated"
    commit-message:
      prefix: "chore(deps):"
      prefix-scope: "dependencies"
      include: "scope"
    allow:
      - dependency-type: "direct"
    ignore:
      - dependency-name: "python"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    reviewers:
      - "sebastienrousseau"
    labels:
      - "ci/cd"
      - "automated"
