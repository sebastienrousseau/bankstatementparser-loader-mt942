name: CI

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install this package + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-cov interrogate

      - name: Run tests with the 100% coverage gate
        run: |
          pytest tests/ \
            --cov=bankstatementparser_loader_mt942 --cov-branch \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=100 -v

      - name: Enforce 100% docstring coverage
        run: interrogate -c pyproject.toml bankstatementparser_loader_mt942

      - name: Upload coverage XML
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install this package + lint deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install ruff black mypy

      - name: Ruff check
        run: ruff check bankstatementparser_loader_mt942/ tests/ examples/

      - name: Black check
        run: black --check bankstatementparser_loader_mt942/ tests/

      - name: Mypy
        run: mypy bankstatementparser_loader_mt942/

  examples:
    name: Examples
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install this package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run examples
        run: |
          python examples/01_load_mt942.py
          python examples/02_summarize_mt942.py
