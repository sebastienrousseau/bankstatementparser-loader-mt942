name: Nightly Quality

on:
  schedule:
    - cron: "0 6 * * 1"  # Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  nightly:
    name: Nightly check + coverage upload
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install bankstatementparser + this package + dev tools
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-cov interrogate ruff black mypy bandit pip-audit

      - name: Full gate (lint + type + tests + interrogate + bandit + audit)
        run: |
          ruff check bankstatementparser_loader_mt942/ tests/
          black --check bankstatementparser_loader_mt942/ tests/
          mypy bankstatementparser_loader_mt942/
          pytest tests/ --cov=bankstatementparser_loader_mt942 --cov-branch --cov-report=xml --cov-fail-under=100
          interrogate -c pyproject.toml bankstatementparser_loader_mt942
          bandit -r bankstatementparser_loader_mt942/ -ll
          pip-audit
