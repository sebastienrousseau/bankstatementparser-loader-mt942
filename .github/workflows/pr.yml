name: PR Gate

on:
  pull_request:

permissions:
  contents: read

jobs:
  gate:
    name: PR sanity checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install bankstatementparser + this package + dev tools
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-cov interrogate ruff black mypy

      - name: Lint
        run: |
          ruff check bankstatementparser_loader_mt942/ tests/
          black --check bankstatementparser_loader_mt942/ tests/

      - name: Type check
        run: mypy bankstatementparser_loader_mt942/

      - name: Tests with 100% coverage gate
        run: |
          pytest tests/ \
            --cov=bankstatementparser_loader_mt942 --cov-branch \
            --cov-report=xml --cov-report=term \
            --cov-fail-under=100

      - name: Docstring coverage
        run: interrogate -c pyproject.toml bankstatementparser_loader_mt942

      - name: Upload coverage to Codecov
        if: ${{ env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v4
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          files: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false
